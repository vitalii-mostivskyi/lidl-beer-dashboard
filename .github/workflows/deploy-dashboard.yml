name: Deploy Beer Dashboard

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare site directory
        run: |
          mkdir -p site
          cp -R src/beer-dashboard/* site/

      - name: Copy committed JSON from src/beer-dashboard folder
        run: |
          if [ -f src/beer-dashboard/untappd-beers.json ]; then
            cp src/beer-dashboard/untappd-beers.json site/untappd-beers.json
          else
            echo "ERROR: src/beer-dashboard/untappd-beers.json not found. Commit the file and re-run the workflow." >&2
            exit 1
          fi

      - name: Deploy to GitHub Pages via gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
