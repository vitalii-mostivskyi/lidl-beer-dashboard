name: Deploy Beer Dashboard

on:
  workflow_dispatch:
    inputs:
      json_content:
        description: 'Paste full untappd beers JSON (multiline)'
        required: true
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare site directory
        run: |
          mkdir -p site
          cp -R BeerDashboard/* site/

      - name: Write JSON to site/untappd-beers.json
        shell: bash
        run: |
          mkdir -p site
          printf '%s' "${{ github.event.inputs.json_content }}" > site/untappd-beers.json

      - name: Deploy to GitHub Pages via gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
