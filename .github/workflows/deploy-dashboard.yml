name: Deploy Beer Dashboard

on:
  workflow_dispatch:
    inputs:
      json_content:
        description: 'Paste full untappd beers JSON (multiline)'
        required: true
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare site directory
        run: |
          mkdir -p site
          cp -R BeerDashboard/* site/

      - name: Write JSON to site/untappd-beers.json
        run: node -e "const fs=require('fs'); fs.mkdirSync('site',{recursive:true}); fs.writeFileSync('site/untappd-beers.json', process.env.JSON_CONTENT || '', 'utf8');"
        env:
          JSON_CONTENT: ${{ github.event.inputs.json_content }}

      - name: Deploy to GitHub Pages via gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
